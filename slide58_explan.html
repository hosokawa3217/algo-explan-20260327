<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習58：コムソート具体例解説 (最終確定版)</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; }
        .theme-bar { width: 15px; height: 50px; background-color: #8b5cf6; margin-right: 20px; }
        h1 { font-size: 32px; margin: 0; font-weight: 900; }
        
        .structure-info { 
            background: #f5f3ff; border: 2px dashed #8b5cf6; border-radius: 8px;
            padding: 10px 20px; margin-bottom: 15px; display: flex; align-items: center; 
        }
        .info-desc { font-weight: 700; color: #1e293b; font-size: 18px; }

        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 250px 250px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; flex-direction: column; align-items: center; padding: 15px; }

        svg { width: 100%; height: 190px; }
        .grid-title-text { fill: #1e3a8a; font-size: 18px; font-weight: 900; text-anchor: middle; }
        .title-underline { stroke: #8b5cf6; stroke-width: 2; }
        
        .node-rect { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .node-target { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 3; }
        .node-swap { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; }
        
        .val-text { font-size: 18px; font-weight: 900; fill: #111827; text-anchor: middle; }
        .label-text { font-size: 14px; font-weight: 900; fill: #6d28d9; text-anchor: middle; }
        .desc-text { font-size: 14px; font-weight: 700; fill: #4b5563; text-anchor: middle; }
        
        .footer { height: 50px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; font-weight: 900; color: #4c1d95; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="theme-bar"></div>
        <h1>コムソート：具体的なデータ移動のプロセス</h1>
    </div>

    <div class="structure-info">
        <div class="info-desc">対象配列：[ 90, 20, 50, 10, 80, 30 ] （n = 6）</div>
    </div>
    
    <div class="infographic-grid">
        <div class="grid-item">
            <svg viewBox="0 0 500 190">
                <text x="250" y="25" class="grid-title-text">Step 1：間隔 m = 3 で開始</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <g transform="translate(50, 85)">
                    <rect class="node-target" x="0" y="0" width="60" height="50" rx="4" /><text x="30" y="32" class="val-text">90</text>
                    <rect class="node-rect" x="65" y="0" width="60" height="50" rx="4" /><text x="95" y="32" class="val-text">20</text>
                    <rect class="node-rect" x="130" y="0" width="60" height="50" rx="4" /><text x="160" y="32" class="val-text">50</text>
                    <rect class="node-target" x="195" y="0" width="60" height="50" rx="4" /><text x="225" y="32" class="val-text">10</text>
                    <rect class="node-rect" x="260" y="0" width="60" height="50" rx="4" /><text x="290" y="32" class="val-text">80</text>
                    <rect class="node-rect" x="325" y="0" width="60" height="50" rx="4" /><text x="355" y="32" class="val-text">30</text>
                    <path d="M 30 -10 Q 127.5 -40 225 -10" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrow-purple)" />
                    <text x="127.5" y="-35" class="label-text">90 > 10 なので交換！</text>
                </g>
                <text x="250" y="180" class="desc-text">遠くの大きな値と小さな値を一気に入れ替える</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 190">
                <text x="250" y="25" class="grid-title-text">Step 2：間隔 m = 1 へ収束</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <g transform="translate(50, 85)">
                    <rect class="node-rect" x="0" y="0" width="60" height="50" rx="4" /><text x="30" y="32" class="val-text">10</text>
                    <rect class="node-rect" x="65" y="0" width="60" height="50" rx="4" /><text x="95" y="32" class="val-text">20</text>
                    <rect class="node-rect" x="130" y="0" width="60" height="50" rx="4" /><text x="160" y="32" class="val-text">50</text>
                    <rect class="node-target" x="195" y="0" width="60" height="50" rx="4" /><text x="225" y="32" class="val-text">90</text>
                    <rect class="node-target" x="260" y="0" width="60" height="50" rx="4" /><text x="290" y="32" class="val-text">80</text>
                    <rect class="node-rect" x="325" y="0" width="60" height="50" rx="4" /><text x="355" y="32" class="val-text">30</text>
                    <path d="M 225 -10 Q 257.5 -40 290 -10" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrow-purple)" />
                    <text x="257.5" y="-35" class="label-text">90 > 80 なので交換</text>
                </g>
                <text x="250" y="180" class="desc-text">櫛の目が一番細かくなり、隣接比較へ移行</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 190">
                <text x="250" y="25" class="grid-title-text">Step 3：隣接比較で仕上げ</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <g transform="translate(50, 85)">
                    <rect class="node-rect" x="0" y="0" width="60" height="50" rx="4" /><text x="30" y="32" class="val-text">10</text>
                    <rect class="node-rect" x="65" y="0" width="60" height="50" rx="4" /><text x="95" y="32" class="val-text">20</text>
                    <rect class="node-rect" x="130" y="0" width="60" height="50" rx="4" /><text x="160" y="32" class="val-text">50</text>
                    <rect class="node-rect" x="195" y="0" width="60" height="50" rx="4" /><text x="225" y="32" class="val-text">80</text>
                    <rect class="node-target" x="260" y="0" width="60" height="50" rx="4" /><text x="290" y="32" class="val-text">90</text>
                    <rect class="node-target" x="325" y="0" width="60" height="50" rx="4" /><text x="355" y="32" class="val-text">30</text>
                    <path d="M 290 -10 Q 322.5 -40 355 -10" stroke="#ef4444" stroke-width="2" fill="none" marker-end="url(#arrow-red)" />
                </g>
                <text x="250" y="180" class="desc-text">バブルソートと同様の手順で細かい逆転を解消</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 190">
                <text x="250" y="25" class="grid-title-text">Step 4：整列完了</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <g transform="translate(50, 85)">
                    <rect class="node-rect" x="0" y="0" width="60" height="50" rx="4" style="stroke:#10b981; stroke-width:3;"/><text x="30" y="32" class="val-text">10</text>
                    <rect class="node-rect" x="65" y="0" width="60" height="50" rx="4" style="stroke:#10b981; stroke-width:3;"/><text x="95" y="32" class="val-text">20</text>
                    <rect class="node-rect" x="130" y="0" width="60" height="50" rx="4" style="stroke:#10b981; stroke-width:3;"/><text x="160" y="32" class="val-text">30</text>
                    <rect class="node-rect" x="195" y="0" width="60" height="50" rx="4" style="stroke:#10b981; stroke-width:3;"/><text x="225" y="32" class="val-text">50</text>
                    <rect class="node-rect" x="260" y="0" width="60" height="50" rx="4" style="stroke:#10b981; stroke-width:3;"/><text x="290" y="32" class="val-text">80</text>
                    <rect class="node-rect" x="325" y="0" width="60" height="50" rx="4" style="stroke:#10b981; stroke-width:3;"/><text x="355" y="32" class="val-text">90</text>
                </g>
                <text x="250" y="180" class="desc-text" style="fill:#065f46; font-size:16px;">少ない交換回数で、効率的にデータが整列！</text>
            </svg>
        </div>
    </div>

    <div class="footer">
        コムソートの威力：荒く梳かしてから細かく仕上げることで、バブルソートを高速化。
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" /></marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
        </defs>
    </svg>
</div>

</body>
</html>
