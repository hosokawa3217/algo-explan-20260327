<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習56：交換法（バブルソート）のアルゴリズム</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; }
        .theme-bar { width: 15px; height: 50px; background-color: #3b82f6; margin-right: 20px; }
        h1 { font-size: 36px; margin: 0; font-weight: 900; }
        
        .structure-info { 
            background: #eff6ff; border: 2px dashed #3b82f6; border-radius: 8px;
            padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
        }
        .info-label { font-size: 18px; font-weight: 900; color: #1e40af; }
        .info-desc { font-weight: 700; color: #1e293b; }

        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 240px 240px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 10px; }

        svg { width: 100%; height: 200px; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #1e3a8a; font-size: 17px; text-anchor: middle; }
        .title-underline { stroke: #3b82f6; stroke-width: 2; }
        
        /* バブルソート用スタイル */
        .node-rect { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .node-fixed { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1; }
        .node-j { fill: #dbeafe; stroke: #3b82f6; stroke-width: 3; }
        .node-next { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; stroke-dasharray: 4; }
        
        .val-text { font-size: 16px; fill: #111827; text-anchor: middle; }
        .ptr-label { font-size: 13px; font-weight: 900; }
        .formula-text { font-size: 16px; font-weight: 900; fill: #2563eb; text-anchor: middle; }
        .result-text { font-size: 14px; font-weight: 900; fill: #334155; text-anchor: middle; }
        
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; font-weight: 900; color: #1d4ed8; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="theme-bar"></div>
        <h1>練習56：交換法（バブルソート）の構造</h1>
    </div>

    <div class="structure-info">
        <div class="info-label">核心：</div>
        <div class="info-desc">隣同士を比較して大きい方を右へ。1周ごとに右端(i)から最大値が「確定」していく。</div>
    </div>
    
    <div class="infographic-grid">
        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">① 制御：確定境界(i)を後ろから詰める</text>
                <line x1="100" y1="32" x2="400" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">i が n から 2 まで減るごとに、未整列範囲が狭まる</text>
                <g transform="translate(80, 90)">
                    <rect class="node-rect" x="0" y="20" width="45" height="40" rx="4" /><text x="22.5" y="46" class="val-text">1</text>
                    <rect class="node-rect" x="50" y="20" width="45" height="40" rx="4" /><text x="72.5" y="46" class="val-text">...</text>
                    <rect class="node-rect" x="100" y="20" width="45" height="40" rx="4" /><text x="122.5" y="46" class="val-text">i</text>
                    <rect class="node-fixed" x="150" y="20" width="45" height="40" rx="4" /><text x="172.5" y="46" class="val-text" opacity="0.4">確定</text>
                    <rect class="node-fixed" x="200" y="20" width="45" height="40" rx="4" /><text x="222.5" y="46" class="val-text" opacity="0.4">確定</text>
                    
                    <text x="122.5" y="75" class="ptr-label" fill="#3b82f6" text-anchor="middle">i (境界)</text>
                    <path d="M 120 10 L 80 10" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
                </g>
                <text x="250" y="185" class="formula-text">外側 i: n → 2 （後ろから順に位置が確定）</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">② 範囲：j + 1 が境界を超えない設計</text>
                <line x1="100" y1="32" x2="400" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">j と j+1 を比較するため、j の上限は i-1</text>
                <g transform="translate(100, 90)">
                    <rect class="node-j" x="40" y="20" width="55" height="40" rx="4" /><text x="67.5" y="46" class="val-text">j</text>
                    <rect class="node-next" x="100" y="20" width="55" height="40" rx="4" /><text x="127.5" y="46" class="val-text">j+1</text>
                    <rect class="node-rect" x="170" y="20" width="55" height="40" rx="4" style="stroke-width:3; stroke:#1e3a8a;"/><text x="197.5" y="46" class="val-text">i</text>
                    
                    <text x="197.5" y="75" class="ptr-label" fill="#1e3a8a" text-anchor="middle">ストッパー</text>
                    <path d="M 130 10 L 160 10" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)" />
                </g>
                <text x="250" y="185" class="formula-text" style="color:#1e40af">空欄(1): j を 1 から i - 1 まで増やす</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">③ 判定：左の方が大きければ交換</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">昇順にするため、逆順(大 > 小)を見つける</text>
                <g transform="translate(150, 80)">
                    <rect class="node-j" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">28</text>
                    <rect class="node-next" x="120" y="20" width="60" height="40" rx="4" /><text x="150" y="46" class="val-text">15</text>
                    <text x="90" y="48" fill="#ef4444" font-size="24px" text-anchor="middle">></text>
                    <text x="90" y="80" class="ptr-label" fill="#ef4444" text-anchor="middle">交換実行！</text>
                </g>
                <text x="250" y="185" class="formula-text">if ( tbl[j] > tbl[j + 1] )</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">④ 手順：一時変数 wk を使った交換</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">wk ← j , j ← j+1 , j+1 ← wk の 3段代入</text>
                <g transform="translate(110, 80)">
                    <rect class="node-j" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">15</text>
                    <rect class="node-next" x="100" y="20" width="60" height="40" rx="4" /><text x="130" y="46" class="val-text">28</text>
                    <rect class="node-rect" x="200" y="20" width="60" height="40" rx="4" style="stroke-dasharray:4;"/><text x="230" y="46" class="val-text" fill="#64748b">wk</text>
                    
                    <path d="M 30 15 Q 115 -15 200 15" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />
                    <text x="15" y="5" class="ptr-label" style="fill: #1d4ed8; text-anchor: end;">wk ← tbl[j]</text>
                </g>
                <text x="250" y="185" class="result-text" style="fill:#1e40af">最大値が泡（バブル）のように右へ移動</text>
            </svg>
        </div>
    </div>

    <div class="footer">
        バブルソート：隣接比較を繰り返すことで、確実に末尾から順番が確定する。
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker>
            <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" /></marker>
        </defs>
    </svg>
</div>

</body>
</html>
