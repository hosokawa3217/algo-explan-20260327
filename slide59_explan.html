<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習59：挿入法（基本挿入ソート）の仕組み</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; }
        .theme-bar { width: 15px; height: 50px; background-color: #ec4899; margin-right: 20px; }
        h1 { font-size: 36px; margin: 0; font-weight: 900; }
        
        .structure-info { 
            background: #fdf2f8; border: 2px dashed #ec4899; border-radius: 8px;
            padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
        }
        .info-label { font-size: 18px; font-weight: 900; color: #be185d; }
        .info-desc { font-weight: 700; color: #1e293b; }

        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 240px 240px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 10px; }

        svg { width: 100%; height: 200px; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #1e3a8a; font-size: 17px; text-anchor: middle; }
        .title-underline { stroke: #ec4899; stroke-width: 2; }
        
        /* 挿入法スタイル */
        .node-rect { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .node-fixed { fill: #fdf2f8; stroke: #ec4899; stroke-width: 2; }
        .node-active { fill: #fce7f3; stroke: #db2777; stroke-width: 3; }
        .node-target { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; stroke-dasharray: 4; }
        
        .val-text { font-size: 16px; fill: #111827; text-anchor: middle; }
        .ptr-label { font-size: 13px; font-weight: 900; }
        .formula-text { font-size: 16px; font-weight: 900; fill: #be185d; text-anchor: middle; }
        .result-text { font-size: 14px; font-weight: 900; fill: #334155; text-anchor: middle; }
        
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; font-weight: 900; color: #9d174d; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="theme-bar"></div>
        <h1>練習59：挿入法（基本挿入ソート）の論理</h1>
    </div>

    <div class="structure-info">
        <div class="info-label">核心：</div>
        <div class="info-desc">整列済みのグループに対し、新しい要素を適切な位置へ「割り込ませて」範囲を広げていく。</div>
    </div>
    
    <div class="infographic-grid">
        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">① 制御：整列済み範囲を右へ広げる</text>
                <line x1="100" y1="32" x2="400" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">外側 i が、次に追加する要素の境界を決める</text>
                <g transform="translate(80, 90)">
                    <rect class="node-fixed" x="0" y="20" width="45" height="40" rx="4" /><text x="22.5" y="46" class="val-text">3</text>
                    <rect class="node-fixed" x="50" y="20" width="45" height="40" rx="4" /><text x="72.5" y="46" class="val-text">8</text>
                    <rect class="node-fixed" x="100" y="20" width="45" height="40" rx="4" /><text x="122.5" y="46" class="val-text">15</text>
                    <rect class="node-active" x="150" y="20" width="45" height="40" rx="4" style="stroke-dasharray: 4;"/><text x="172.5" y="46" class="val-text">7</text>
                    <rect class="node-rect" x="200" y="20" width="45" height="40" rx="4" /><text x="222.5" y="46" class="val-text">12</text>
                    
                    <text x="72.5" y="75" class="ptr-label" fill="#ec4899" text-anchor="middle">整列済み範囲</text>
                    <path d="M 0 10 L 145 10" stroke="#ec4899" stroke-width="2" marker-end="url(#arrow-pink)" />
                    <text x="172.5" y="75" class="ptr-label" fill="#db2777" text-anchor="middle">i (新要素)</text>
                </g>
                <text x="250" y="185" class="formula-text">外側 i: 1 〜 n - 1 (順次拡大)</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">② 走査：新要素を左へ運んでいく</text>
                <line x1="100" y1="32" x2="400" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">内側 j が、新要素を先頭に向かってスキャン</text>
                <g transform="translate(100, 90)">
                    <rect class="node-rect" x="40" y="20" width="55" height="40" rx="4" /><text x="67.5" y="46" class="val-text">j</text>
                    <rect class="node-active" x="100" y="20" width="55" height="40" rx="4" /><text x="127.5" y="46" class="val-text">j+1</text>
                    <rect class="node-rect" x="170" y="20" width="55" height="40" rx="4" style="opacity:0.5;"/><text x="197.5" y="46" class="val-text">i</text>
                    
                    <text x="67.5" y="75" class="ptr-label" fill="#64748b" text-anchor="middle">比較先</text>
                    <text x="127.5" y="75" class="ptr-label" fill="#db2777" text-anchor="middle">運ぶ要素</text>
                    <path d="M 120 10 L 50 10" stroke="#db2777" stroke-width="2" marker-end="url(#arrow-pink-dark)" />
                </g>
                <text x="250" y="185" class="formula-text" style="color:#db2777">空欄(1): j を i から 1 まで減らす</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">③ 挿入：自分より大きければ交換</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">tbl[j] > tbl[j+1] ならば位置を入れ替える</text>
                <g transform="translate(150, 80)">
                    <rect class="node-rect" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">15</text>
                    <rect class="node-active" x="120" y="20" width="60" height="40" rx="4" /><text x="150" y="46" class="val-text">7</text>
                    <text x="90" y="48" fill="#ef4444" font-size="24px" text-anchor="middle">></text>
                    <path d="M 140 15 Q 90 -15 40 15" stroke="#db2777" stroke-width="2" fill="none" marker-end="url(#arrow-pink-dark)" />
                    <text x="15" y="5" class="ptr-label" style="fill: #db2777; text-anchor: end;">交換して左へ</text>
                </g>
                <text x="250" y="185" class="desc-text">正しい位置（小さい値と大きい値の間）まで運ぶ</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">④ 効率：自分以下に出会ったら終了</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">左側は整列済み。一度でも小さければ break</text>
                <g transform="translate(110, 80)">
                    <rect class="node-fixed" x="0" y="20" width="60" height="40" rx="4" style="stroke:#15803d;"/><text x="30" y="46" class="val-text">3</text>
                    <rect class="node-rect" x="100" y="20" width="60" height="40" rx="4" /><text x="130" y="46" class="val-text">7</text>
                    <text x="80" y="48" fill="#15803d" font-size="24px" text-anchor="middle">≤</text>
                    <rect x="70" y="15" width="20" height="50" rx="2" fill="#ef4444" transform="rotate(20 80 40)"/>
                    <rect x="70" y="15" width="20" height="50" rx="2" fill="#ef4444" transform="rotate(-20 80 40)"/>
                    <text x="200" y="46" class="ptr-label" fill="#ef4444">break!</text>
                </g>
                <text x="250" y="185" class="result-text" style="fill:#be185d">ある程度整列されたデータで非常に高速</text>
            </svg>
        </div>
    </div>

    <div class="footer">
        挿入法：新要素を逆方向にスキャンし、適切な位置へ割り込ませ、無駄な比較を break で切り上げる。
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <marker id="arrow-pink" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ec4899" /></marker>
            <marker id="arrow-pink-dark" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#db2777" /></marker>
        </defs>
    </svg>
</div>

</body>
</html>
