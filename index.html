<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルゴリズム演習 メニュー</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex; height: 100vh; width: 100vw;
            background-color: #4b5563;
            overflow: hidden; 
        }

        /* サイドバー：幅170px */
        aside {
            width: 170px; flex-shrink: 0;
            background-color: #ffffff; border-right: 2px solid #e5e7eb;
            display: flex; flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 10;
        }

        .menu-header { padding: 10px; border-bottom: 2px solid #e5e7eb; }
        .menu-header h2 { margin: 0; font-size: 14px; color: #1f2937; border-left: 4px solid #3b82f6; padding-left: 8px; }

        .button-list { flex: 1; overflow-y: auto; padding: 5px; }

        .problem-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid #f3f4f6;
            white-space: nowrap;
        }

        .problem-label {
            font-size: 12px; font-weight: bold; color: #374151;
            width: 50px; flex-shrink: 0;
        }

        .btn-group {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
            width: 105px;
        }

        .action-btn {
            flex: 1;
            height: 28px;
            line-height: 1;
            padding: 0;
            text-align: center;
            background-color: #ffffff;
            border: 1px solid #e5e7eb !important;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        /* [処理] ボタン：オレンジ */
        .btn-process { border-left: 4px solid #f97316 !important; } 
        .btn-process:hover { background-color: #fff7ed; border-color: #fb923c !important; color: #ea580c; }
        .btn-process.active { background-color: #f97316 !important; color: #ffffff !important; border-color: #ea580c !important; }

        /* [解説] ボタン：緑 */
        .btn-explan { border-left: 4px solid #10b981 !important; }
        .btn-explan:hover { background-color: #f0fdf4; border-color: #34d399 !important; color: #059669; }
        .btn-explan.active { background-color: #10b981 !important; color: #ffffff !important; border-color: #059669 !important; }

        main { flex: 1; position: relative; background-color: #4b5563; overflow: hidden; }

        #slide-view {
            width: 1280px; height: 720px;
            border: none; background-color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: absolute;
            transform-origin: top left;
        }

        .button-list::-webkit-scrollbar { width: 4px; }
        .button-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    </style>
</head>
<body>
    <aside>
        <div class="menu-header"><h2>演習一覧</h2></div>
        <div id="menu" class="button-list"></div>
    </aside>
    <main id="main-view">
        <iframe id="slide-view" src="slide40_explan.html"></iframe>
    </main>

    <script>
        const menu = document.getElementById('menu');
        const iframe = document.getElementById('slide-view');
        const mainView = document.getElementById('main-view');

        for (let i = 40; i <= 77; i++) {
            const row = document.createElement('div');
            row.className = 'problem-row';

            const label = document.createElement('div');
            label.className = 'problem-label';
            label.innerText = `練 ${i}`;
            row.appendChild(label);

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            // [処理] ボタン -> slideX_explan.html を表示
            const btnProcess = document.createElement('button');
            btnProcess.className = 'action-btn btn-process';
            btnProcess.innerHTML = `処`;
            if (i === 40) btnProcess.classList.add('active'); // 初期状態
            btnProcess.onclick = () => loadSlide(btnProcess, `slide${i}_explan.html`);

            // [解説] ボタン -> slideX.html を表示
            const btnExplan = document.createElement('button');
            btnExplan.className = 'action-btn btn-explan';
            btnExplan.innerHTML = `解`;
            btnExplan.onclick = () => loadSlide(btnExplan, `slide${i}.html`);

            btnGroup.appendChild(btnProcess);
            btnGroup.appendChild(btnExplan);
            row.appendChild(btnGroup);
            menu.appendChild(row);
        }

        function loadSlide(clickedBtn, url) {
            document.querySelectorAll('.action-btn').forEach(b => b.classList.remove('active'));
            clickedBtn.classList.add('active');
            iframe.src = url;
        }

        function resizeIframe() {
            const margin = 20;
            const availableWidth = mainView.clientWidth - margin;
            const availableHeight = mainView.clientHeight - margin;
            const scale = Math.min(availableWidth / 1280, availableHeight / 720);
            iframe.style.transform = `scale(${scale})`;
            const offsetX = (mainView.clientWidth - (1280 * scale)) / 2;
            const offsetY = (mainView.clientHeight - (720 * scale)) / 2;
            iframe.style.left = `${offsetX}px`;
            iframe.style.top = `${offsetY}px`;
        }

        window.onresize = resizeIframe;
        window.onload = resizeIframe;
        setTimeout(resizeIframe, 100);
    </script>
</body>
</html>
