<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習41：番兵法を用いた線形探索</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; }
        .theme-bar { width: 15px; height: 50px; background-color: #10b981; margin-right: 20px; }
        h1 { font-size: 36px; margin: 0; font-weight: 900; }
        
        .structure-info { 
            background: #f0fdf4; border: 2px dashed #10b981; border-radius: 8px;
            padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
        }
        .info-label { font-size: 18px; font-weight: 900; color: #15803d; }
        .info-desc { font-weight: 700; color: #374151; }

        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 240px 240px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 10px; }
        .grid-item-final { background-color: #f0f9ff; border: 2px solid #3b82f6; }

        svg { width: 100%; height: 200px; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #1e3a8a; font-size: 17px; text-anchor: middle; }
        .title-underline { stroke: #10b981; stroke-width: 2; }
        
        /* 番兵法用スタイル */
        .node-rect { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .node-sentinel { fill: #fee2e2; stroke: #ef4444; stroke-width: 2.5; stroke-dasharray: 4; }
        .node-focus { fill: #f0fdf4; stroke: #10b981; stroke-width: 3; }
        .val-text { font-size: 16px; fill: #111827; text-anchor: middle; }
        .index-text { font-size: 12px; fill: #6b7280; text-anchor: middle; }
        .ptr-label { font-size: 13px; font-weight: 900; text-anchor: middle; }
        .formula-text { font-size: 16px; font-weight: 900; fill: #059669; text-anchor: middle; }
        .result-text { font-size: 15px; font-weight: 900; fill: #374151; text-anchor: middle; }
        .sentinel-label { font-size: 12px; fill: #ef4444; text-anchor: middle; }
        
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; font-weight: 900; color: #065f46; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="theme-bar"></div>
        <h1>練習41：番兵法（ばんぺいほう）による探索の効率化</h1>
    </div>

    <div class="structure-info">
        <div class="info-label">番兵法の極意：</div>
        <div class="info-desc">データの末尾に「探索対象」を置くことで、ループ内の【範囲チェック（i ≤ n）】を省略し、速度を稼ぐ。</div>
    </div>
    
    <div class="infographic-grid">
        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">① 準備：番兵（Sentinel）の設置</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">data = 40 を配列の最後(n+1)にコピーする</text>
                
                <g transform="translate(40, 90)">
                    <rect class="node-rect" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">10</text><text x="30" y="75" class="index-text">1</text>
                    <rect class="node-rect" x="70" y="20" width="60" height="40" rx="4" /><text x="100" y="46" class="val-text">25</text><text x="100" y="75" class="index-text">2</text>
                    <text x="155" y="46" class="val-text">...</text>
                    <rect class="node-rect" x="200" y="20" width="60" height="40" rx="4" /><text x="230" y="46" class="val-text">88</text><text x="230" y="75" class="index-text">n</text>
                    
                    <rect class="node-sentinel" x="280" y="20" width="60" height="40" rx="4" /><text x="310" y="46" class="val-text" fill="#ef4444">40</text><text x="310" y="75" class="index-text">n+1</text>
                    <text x="310" y="15" class="sentinel-label">番兵</text>
                </g>
                <text x="250" y="185" class="formula-text">tbl[n + 1] ← data</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">② ループ：判定は「一致」のみ</text>
                <line x1="130" y1="32" x2="370" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">必ずどこかで止まるため、範囲確認が不要</text>

                <g transform="translate(100, 80)">
                    <rect x="0" y="0" width="300" height="60" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1" />
                    <text x="150" y="25" class="formula-text" style="font-size:20px">while (tbl[i] ≠ data)</text>
                    <text x="150" y="48" class="result-text" fill="#059669">i ← i + 1</text>
                    <text x="280" y="25" fill="#ef4444" font-size="24px" opacity="0.6">×</text>
                    <text x="280" y="45" fill="#ef4444" font-size="10px">i ≤ n 不要</text>
                </g>
                <text x="250" y="185" class="result-text">1ループあたりの処理負荷が減少</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">③ 停止：必ず番兵かその前で止まる</text>
                <line x1="100" y1="32" x2="400" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">見つからない場合も、最後(n+1)で停止する</text>

                <g transform="translate(100, 90)">
                    <rect class="node-rect" x="0" y="20" width="60" height="40" rx="4" opacity="0.3" /><text x="30" y="46" class="val-text" opacity="0.3">88</text>
                    <rect class="node-sentinel" x="80" y="20" width="60" height="40" rx="4" /><text x="110" y="46" class="val-text">40</text>
                    <polygon points="110,15 102,0 118,0" fill="#ef4444" /><text x="110" y="-5" class="ptr-label" fill="#ef4444">i</text>
                    <text x="180" y="46" class="result-text">ここで強制終了</text>
                </g>
                <text x="250" y="185" class="formula-text" fill="#ef4444">i は必ず「dataの位置」を指す</text>
            </svg>
        </div>

        <div class="grid-item grid-item-final">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text" fill="#1e40af">④ 判定：停止した場所を確認</text>
                <line x1="130" y1="32" x2="370" y2="32" class="title-underline" style="stroke:#3b82f6;" />
                <text x="250" y="55" class="result-text">i がデータ範囲(n以下)なら「本物」を発見</text>

                <g transform="translate(100, 80)">
                    <rect x="0" y="0" width="300" height="70" rx="8" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2" />
                    <text x="150" y="30" class="formula-text" fill="#1e40af" style="font-size:22px">if (i ≤ n)</text>
                    <text x="60" y="55" class="result-text" fill="#15803d">YES: 発見</text>
                    <text x="240" y="55" class="result-text" fill="#b91c1c">NO: 番兵(失敗)</text>
                    <line x1="150" y1="40" x2="150" y2="60" stroke="#3b82f6" stroke-width="1" />
                </g>
                <text x="250" y="185" class="formula-text" fill="#1e40af">空欄(1)の正解：i ≤ n</text>
            </svg>
        </div>
    </div>

    <div class="footer">
        結論：番兵法は「停止を保証」することで、反復中のムダな比較を削る高速化技術である。
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker>
        </defs>
    </svg>
</div>

</body>
</html>
