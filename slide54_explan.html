<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習54：選択法（選択ソート）のアルゴリズム</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; }
        .theme-bar { width: 15px; height: 50px; background-color: #06b6d4; margin-right: 20px; }
        h1 { font-size: 36px; margin: 0; font-weight: 900; }
        
        .structure-info { 
            background: #ecfeff; border: 2px dashed #06b6d4; border-radius: 8px;
            padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
        }
        .info-label { font-size: 18px; font-weight: 900; color: #0891b2; }
        .info-desc { font-weight: 700; color: #374151; }

        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 240px 240px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 10px; }

        svg { width: 100%; height: 200px; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #1e3a8a; font-size: 17px; text-anchor: middle; }
        .title-underline { stroke: #06b6d4; stroke-width: 2; }
        
        .node-rect { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .node-fixed { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1.5; }
        .node-i { fill: #ecfeff; stroke: #06b6d4; stroke-width: 3; }
        .node-j { fill: #fff7ed; stroke: #f97316; stroke-width: 2; stroke-dasharray: 4; }
        
        .val-text { font-size: 16px; fill: #111827; text-anchor: middle; }
        .ptr-label { font-size: 13px; font-weight: 900; }
        .formula-text { font-size: 16px; font-weight: 900; fill: #0891b2; text-anchor: middle; }
        .result-text { font-size: 15px; font-weight: 900; fill: #374151; text-anchor: middle; }
        
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; font-weight: 900; color: #155e75; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="theme-bar"></div>
        <h1>練習54：選択法（選択ソート）の仕組み</h1>
    </div>

    <div class="structure-info">
        <div class="info-label">核心：</div>
        <div class="info-desc">基準位置(i)に対して、後ろ側(j)にある最小値を「見つけて ➡ 交換する」手続き。</div>
    </div>
    
    <div class="infographic-grid">
        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">① 制御：確定位置(i)と比較相手(j)</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">二重ループで「場所」と「最小値」を管理</text>
                <g transform="translate(60, 90)">
                    <rect class="node-fixed" x="0" y="20" width="50" height="40" rx="4" /><text x="25" y="46" class="val-text" opacity="0.5">3</text>
                    <rect class="node-i" x="60" y="20" width="50" height="40" rx="4" /><text x="85" y="46" class="val-text">12</text>
                    <rect class="node-rect" x="120" y="20" width="50" height="40" rx="4" /><text x="145" y="46" class="val-text">25</text>
                    <rect class="node-j" x="180" y="20" width="50" height="40" rx="4" /><text x="205" y="46" class="val-text">7</text>
                    <text x="85" y="75" class="ptr-label" fill="#06b6d4" text-anchor="middle">i</text>
                    <text x="205" y="75" class="ptr-label" fill="#f97316" text-anchor="middle">j</text>
                </g>
                <text x="250" y="185" class="formula-text">外側 i：1 〜 n-1 ／ 内側 j：i+1 〜 n</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">② 交換Step1：元の値を wk へ退避</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">上書きで値が消える前に一時保存エリアへ</text>
                <g transform="translate(150, 80)">
                    <rect class="node-i" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">12</text>
                    <rect class="node-rect" x="140" y="20" width="60" height="40" rx="4" style="stroke-dasharray: 4;"/><text x="170" y="46" class="val-text" fill="#64748b">wk</text>
                    <path d="M 40 15 Q 85 -10 130 15" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)" />
                    <text x="-10" y="10" class="ptr-label" style="fill: #06b6d4; text-anchor: end;">wk ← tbl[i]</text>
                </g>
                <text x="250" y="185" class="formula-text">代入によるデータの消失を防止</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">③ 交換Step2：最小値を先頭(i)へ</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">見つけた小さな値を確定させる位置へコピー</text>
                <g transform="translate(150, 80)">
                    <rect class="node-i" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">7</text>
                    <rect class="node-j" x="140" y="20" width="60" height="40" rx="4" /><text x="170" y="46" class="val-text">7</text>
                    <path d="M 130 15 Q 85 -10 40 15" stroke="#f97316" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" />
                    <text x="10" y="10" class="ptr-label" style="fill: #f97316; text-anchor: end;">空欄(1): tbl[i] ← tbl[j]</text>
                </g>
                <text x="250" y="185" class="formula-text">i 番目の要素が最小候補に更新される</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">④ 交換Step3：退避した値を tbl[j] へ</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">ワークエリアから戻して入れ替えを完了する</text>
                <g transform="translate(100, 80)">
                    <rect class="node-j" x="140" y="20" width="60" height="40" rx="4" /><text x="170" y="46" class="val-text">12</text>
                    <rect class="node-rect" x="260" y="20" width="60" height="40" rx="4" /><text x="290" y="46" class="val-text">12</text><text x="290" y="75" class="index-text" text-anchor="middle">wk</text>
                    <path d="M 250 15 Q 200 -10 150 15" stroke="#0891b2" stroke-width="2" fill="none" marker-end="url(#arrow-cyan)" />
                    <text x="110" y="10" class="ptr-label" style="fill: #0891b2; text-anchor: end;">空欄(2): tbl[j] ← wk</text>
                </g>
                <text x="250" y="185" class="result-text" style="fill: #1e40af;">これによって交換が正常に終了</text>
            </svg>
        </div>
    </div>

    <div class="footer">
        選択法：一巡ごとに確定済みのエリアが左側から広がっていく。
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <marker id="arrow-cyan" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4" /></marker>
            <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316" /></marker>
        </defs>
    </svg>
</div>

</body>
</html>
