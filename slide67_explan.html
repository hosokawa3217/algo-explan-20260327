<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習67：文字列探索（力まかせ法）解説スライド</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --bg-gray: #f3f4f6;
            --panel-bg: #f9fafb;
            --border: #e5e7eb;
        }

        /* 全体設定：スクロールスナップ */
        html, body {
            margin: 0; padding: 0;
            background-color: var(--bg-gray);
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .viewport {
            width: 100vw;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        .viewport::-webkit-scrollbar { display: none; }

        .slide-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            scroll-snap-align: start;
        }

        .slide { 
            width: 1280px; 
            height: 900px; 
            background-color: #ffffff; 
            padding: 0 60px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* ヘッダー */
        .header-area { 
            height: 90px; display: flex; align-items: center; 
            justify-content: space-between; padding-top: 15px; 
        }
        .header-left { display: flex; align-items: center; }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .theme-bar { width: 15px; height: 45px; margin-right: 20px; }
        .theme-blue { background-color: var(--primary); }
        .theme-green { background-color: var(--success); }
        h1 { font-size: 34px; margin: 0; font-weight: 900; color: #111827; }
        
        .algo-label { 
            background: var(--primary); color: white; padding: 4px 12px; 
            border-radius: 20px; font-size: 14px; font-weight: bold; 
        }
        .page-num { font-size: 24px; font-weight: 900; color: #94a3b8; width: 60px; text-align: right; }

        .sub-info { height: 50px; font-size: 22px; font-weight: 700; color: #4b5563; display: flex; align-items: center; }

        /* グリッド・パネル */
        .infographic-grid { 
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 640px; 
            gap: 20px; margin-top: 5px;
        }
        .grid-item-full { 
            border: 2px solid var(--border); border-radius: 12px; 
            background-color: var(--panel-bg); padding: 20px; height: 640px; box-sizing: border-box;
        }

        /* SVG共通 */
        svg { width: 100%; height: 100%; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #1e3a8a; font-size: 22px; }
        .val-text { font-size: 20px; text-anchor: middle; }
        .label-text { font-size: 15px; fill: #4b5563; }
        .cell { fill: #ffffff; stroke: #1f2937; stroke-width: 2; }
        .cell-ptn { fill: #f8fafc; stroke: var(--primary); stroke-width: 2; }

        /* フッター */
        .footer {
            margin-top: auto; margin-bottom: 35px; padding: 18px 25px;
            background-color: #eff6ff; border-radius: 10px; border-left: 8px solid var(--primary);
            display: flex; justify-content: center; align-items: center;
        }
        .footer-text { font-size: 18px; font-weight: 700; color: #1f2937; }

        .scroll-hint {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.5); color: white; padding: 8px 15px;
            border-radius: 20px; font-size: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="viewport">
    <div class="slide-wrapper">
        <div class="slide" id="page1">
            <div class="header-area">
                <div class="header-left">
                    <div class="theme-bar theme-blue"></div>
                    <h1>練習67：文字列探索（力まかせ法）①</h1>
                </div>
                <div class="header-right">
                    <span class="algo-label">基本原理</span>
                    <span class="page-num">1 / 2</span>
                </div>
            </div>
            <div class="sub-info">対象文字列(moji)の先頭からパターン(ptn)を1文字ずつ比較する</div>
            
            <div class="infographic-grid">
                <div class="grid-item-full">
                    <svg viewBox="0 0 500 500">
                        <text x="250" y="40" class="grid-title-text" text-anchor="middle">① 探索の対象とパターン</text>
                        
                        <text x="30" y="110" class="label-text">moji (探索対象)</text>
                        <g transform="translate(30, 130)">
                            <rect x="0" y="0" width="440" height="50" fill="#f3f4f6" stroke="#94a3b8" />
                            <text x="220" y="32" class="val-text" font-size="22" letter-spacing="8">baabababaa</text>
                        </g>
                        
                        <text x="30" y="240" class="label-text">ptn (探すパターン)</text>
                        <g transform="translate(30, 260)">
                            <rect x="0" y="0" width="150" height="50" class="cell-ptn" />
                            <text x="75" y="32" class="val-text" fill="var(--primary)" font-size="22" letter-spacing="8">aba</text>
                        </g>

                        <rect x="30" y="360" width="440" height="80" rx="10" fill="#fff" stroke="#e5e7eb" />
                        <text x="50" y="395" font-size="14" fill="#6b7280">・mojiの1文字目から照合を開始する</text>
                        <text x="50" y="420" font-size="14" fill="#6b7280">・見つかるまでptnを1つずつ右にずらす</text>
                    </svg>
                </div>

                <div class="grid-item-full">
                    <svg viewBox="0 0 500 500">
                        <text x="250" y="40" class="grid-title-text" text-anchor="middle">② 最初（1回目）の比較</text>
                        <g transform="translate(100, 100)">
                            <rect x="0" y="0" width="60" height="60" class="cell"/><text x="30" y="40" class="val-text" font-size="28">b</text>
                            <rect x="60" y="0" width="60" height="60" class="cell"/><text x="90" y="40" class="val-text" font-size="28">a</text>
                            <rect x="120" y="0" width="60" height="60" class="cell"/><text x="150" y="40" class="val-text" font-size="28">a</text>
                            
                            <path d="M 30 75 V 145" stroke="var(--danger)" stroke-width="3" stroke-dasharray="5" marker-end="url(#arrR)"/>
                            <text x="35" y="115" font-size="14" fill="var(--danger)" font-weight="bold">不一致!</text>

                            <rect x="0" y="160" width="60" height="60" class="cell-ptn"/><text x="30" y="200" class="val-text" fill="var(--primary)" font-size="28">a</text>
                            <rect x="60" y="160" width="60" height="60" class="cell-ptn"/><text x="90" y="200" class="val-text" fill="var(--primary)" font-size="28">b</text>
                            <rect x="120" y="160" width="60" height="60" class="cell-ptn"/><text x="150" y="200" class="val-text" fill="var(--primary)" font-size="28">a</text>
                        </g>
                        <text x="250" y="420" class="val-text" fill="var(--danger)" font-size="18">先頭が "b" と "a" で異なるため、</text>
                        <text x="250" y="450" class="val-text" fill="var(--danger)" font-size="18">この位置での比較を打ち切り、次へ移る</text>
                    </svg>
                </div>
            </div>
            <div class="footer">
                <div class="footer-text">力まかせ法は、一致するまで開始位置を1文字ずつ右へずらして全探索する。</div>
            </div>
        </div>
    </div>

    <div class="slide-wrapper">
        <div class="slide" id="page2">
            <div class="header-area">
                <div class="header-left">
                    <div class="theme-bar theme-green"></div>
                    <h1>練習67：文字列探索のトレース ②</h1>
                </div>
                <div class="header-right">
                    <span class="algo-label" style="background: var(--success);">トレース解説</span>
                    <span class="page-num">2 / 2</span>
                </div>
            </div>
            <div class="sub-info">不一致なら即座に打ち切り、次（1文字右）の比較を開始する</div>
            
            <div class="grid-item-full">
                <svg viewBox="0 0 1000 550">
                    <text x="50" y="45" font-size="20" fill="#4b5563">moji全体:</text>
                    <g transform="translate(150, 15)">
                        <rect x="0" y="0" width="45" height="45" class="cell"/><text x="22.5" y="30" class="val-text">b</text>
                        <rect x="45" y="0" width="45" height="45" class="cell"/><text x="67.5" y="30" class="val-text">a</text>
                        <rect x="90" y="0" width="45" height="45" class="cell"/><text x="112.5" y="30" class="val-text">a</text>
                        <rect x="135" y="0" width="45" height="45" class="cell"/><text x="157.5" y="30" class="val-text">b</text>
                        <rect x="180" y="0" width="45" height="45" class="cell"/><text x="202.5" y="30" class="val-text">a</text>
                        <rect x="225" y="0" width="45" height="45" class="cell"/><text x="247.5" y="30" class="val-text">b</text>
                        <text x="300" y="30" font-size="22" fill="#94a3b8">...</text>
                    </g>

                    <line x1="50" y1="85" x2="950" y2="85" stroke="#e5e7eb" stroke-width="2" />

                    <g transform="translate(150, 130)">
                        <text x="-100" y="30" font-size="18" font-weight="bold">1回目</text>
                        <rect x="0" y="0" width="45" height="45" fill="#fee2e2" stroke="var(--danger)"/><text x="22.5" y="30" class="val-text" fill="var(--danger)">a</text>
                        <rect x="45" y="0" width="45" height="45" class="cell" opacity="0.2"/><text x="67.5" y="30" class="val-text" opacity="0.2">b</text>
                        <rect x="90" y="0" width="45" height="45" class="cell" opacity="0.2"/><text x="112.5" y="30" class="val-text" opacity="0.2">a</text>
                        <text x="160" y="30" font-size="18" fill="var(--danger)">← 1文字目で不一致：即座に終了（効率化）</text>
                    </g>

                    <g transform="translate(195, 230)">
                        <text x="-145" y="30" font-size="18" font-weight="bold">2回目 (1字右へ)</text>
                        <rect x="0" y="0" width="45" height="45" fill="#ecfdf5" stroke="var(--success)"/><text x="22.5" y="30" class="val-text" fill="var(--success)">a</text>
                        <rect x="45" y="0" width="45" height="45" fill="#fee2e2" stroke="var(--danger)"/><text x="67.5" y="30" class="val-text" fill="var(--danger)">b</text>
                        <rect x="90" y="0" width="45" height="45" class="cell" opacity="0.2"/><text x="112.5" y="30" class="val-text" opacity="0.2">a</text>
                        <text x="160" y="30" font-size="18" fill="var(--danger)">← 2文字目で不一致：この探索を打ち切り</text>
                    </g>

                    <g transform="translate(240, 330)">
                        <text x="-190" y="30" font-size="18" font-weight="bold">3回目 (さらに右へ)</text>
                        <rect x="0" y="0" width="45" height="45" fill="#ecfdf5" stroke="var(--success)"/><text x="22.5" y="30" class="val-text" fill="var(--success)">a</text>
                        <rect x="45" y="0" width="45" height="45" fill="#ecfdf5" stroke="var(--success)"/><text x="67.5" y="30" class="val-text" fill="var(--success)">b</text>
                        <rect x="90" y="0" width="45" height="45" fill="#ecfdf5" stroke="var(--success)"/><text x="112.5" y="30" class="val-text" fill="var(--success)">a</text>
                        <text x="160" y="30" font-size="22" fill="var(--success)" font-weight="900">★ 完全一致！パターン発見</text>
                    </g>

                    <rect x="550" y="110" width="400" height="150" rx="10" fill="#f0fdf4" stroke="#bbf7d0" />
                    <text x="575" y="150" font-size="20" fill="#166534" font-weight="bold">合理的な探索プロセスの肝</text>
                    <text x="575" y="185" font-size="16" fill="#166534">・一致した文字数分だけ比較を進める</text>
                    <text x="575" y="215" font-size="16" fill="#166534">・不一致が出た瞬間、無駄な比較は行わない</text>
                </svg>
            </div>
            <div class="footer" style="border-left-color: var(--success); background-color: #f0fdf4;">
                <div class="footer-text">「不一致なら即打ち切り」を繰り返すことで、効率的に特定のパターンを特定する。</div>
            </div>
        </div>
    </div>
</div>

<div class="scroll-hint">マウススクロールで解説を切り替え</div>

<svg style="position:absolute; width:0; height:0;">
    <defs>
        <marker id="arrR" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--danger)"/>
        </marker>
    </defs>
</svg>

</body>
</html>
