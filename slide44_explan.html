<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習44：サンプル配列と注目要素（矢印調整版）</title>
    <style>
        /* ■ 1. スライド全体設計 (1280x720px固定) */
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; position: relative; box-sizing: border-box; 
            padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }

        /* [A] ヘッダー：100px */
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; box-sizing: border-box; }
        .blue-bar { width: 15px; height: 50px; background-color: #f59e0b; margin-right: 20px; }
        h1 { font-size: 36px; margin: 0; color: #000000; font-weight: 900; }

        /* [B] サブ情報：60px */
        .problem-statement { height: 60px; font-size: 24px; font-weight: 700; color: #1f2937; display: flex; align-items: center; }

        /* [C][D] メイン図解領域：230px + 230px */
        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 230px 230px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; justify-content: center; align-items: center; }

        /* [E] フッター：60px */
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; }
        .footer-text { font-size: 19px; font-weight: bold; color: #4b5563; }

        /* ■ 2. SVG内部設計 (高さ180px) */
        svg { width: 100%; height: 180px; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #92400e; font-size: 18px; text-anchor: middle; }
        .cell { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
        .cell-done { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 1; }
        .cell-focus { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; }
        .result-text { font-size: 16px; text-anchor: middle; font-weight: 900; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="blue-bar"></div>
        <h1>練習44：走査プロセスと配列の様子</h1>
    </div>

    <div class="problem-statement">
        探索対象 <b>tbl</b> = [35, 12, 88, 42] （範囲 <b>lv</b>: 10 ～ <b>hv</b>: 90）
    </div>
    
    <div class="infographic-grid">
        
        <div class="grid-item">
            <svg viewBox="0 0 500 180">
                <text x="250" y="20" class="grid-title-text">① 走査開始前の初期状態</text>
                <line x1="50" y1="30" x2="450" y2="30" stroke="#f59e0b" stroke-width="2"/>
                <g transform="translate(0, 50)">
                    <rect x="100" y="10" width="120" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
                    <text x="160" y="30" text-anchor="middle" font-size="12" fill="#1e40af">min (初期値=hv)</text>
                    <text x="160" y="52" text-anchor="middle" font-size="22" fill="#1e40af">90</text>
                    
                    <rect x="280" y="10" width="120" height="50" rx="8" fill="#fee2e2" stroke="#ef4444"/>
                    <text x="340" y="30" text-anchor="middle" font-size="12" fill="#991b1b">max (初期値=lv)</text>
                    <text x="340" y="52" text-anchor="middle" font-size="22" fill="#991b1b">10</text>
                </g>
                <text x="250" y="165" class="result-text" fill="#b45309">最初のデータで必ず更新されるための準備</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 180">
                <text x="250" y="20" class="grid-title-text">② サンプル配列と注目要素</text>
                <line x1="50" y1="30" x2="450" y2="30" stroke="#f59e0b" stroke-width="2"/>
                <g transform="translate(0, 50)">
                    <rect class="cell-done" x="120" y="40" width="60" height="50" /> <text x="150" y="72" text-anchor="middle">35</text>
                    <rect class="cell-focus" x="190" y="40" width="60" height="50" /> <text x="220" y="72" text-anchor="middle">12</text>
                    <rect class="cell" x="260" y="40" width="60" height="50" /> <text x="290" y="72" text-anchor="middle">88</text>
                    <rect class="cell" x="330" y="40" width="60" height="50" /> <text x="360" y="72" text-anchor="middle">42</text>
                    
                    <path d="M 220 30 V 12" stroke="#ea580c" stroke-width="2" marker-end="url(#arrSmall)"/>
                    <text x="220" y="5" text-anchor="middle" font-size="14" fill="#ea580c" font-weight="900">i=1 をチェック中</text>
                </g>
                <text x="250" y="165" class="result-text" fill="#000000">配列の先頭から順番に1つずつ取り出す</text>
                <defs>
                    <marker id="arrSmall" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
                        <path d="M 0 0 L 5 10 L 10 0 Z" fill="#ea580c"/>
                    </marker>
                </defs>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 180">
                <text x="250" y="20" class="grid-title-text">③ 最小値(min)の更新判定</text>
                <line x1="50" y1="30" x2="450" y2="30" stroke="#f59e0b" stroke-width="2"/>
                <g transform="translate(0, 50)">
                    <text x="150" y="20" text-anchor="middle" font-size="14" fill="#3b82f6">暫定 min: 35</text>
                    <text x="250" y="45" text-anchor="middle" font-size="24" fill="#1f2937">12 ＜ 35 ?</text>
                    <rect x="330" y="10" width="100" height="50" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
                    <text x="380" y="42" text-anchor="middle" font-size="20" fill="#1e40af">YES!</text>
                </g>
                <text x="250" y="165" class="result-text" fill="#1e40af">min を新しい値 12 で上書きする</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 180">
                <text x="250" y="20" class="grid-title-text">④ 最大値(max)の更新判定</text>
                <line x1="50" y1="30" x2="450" y2="30" stroke="#f59e0b" stroke-width="2"/>
                <g transform="translate(0, 50)">
                    <text x="150" y="20" text-anchor="middle" font-size="14" fill="#ef4444">暫定 max: 35</text>
                    <text x="250" y="45" text-anchor="middle" font-size="24" fill="#1f2937">12 ＞ 35 ?</text>
                    <rect x="330" y="10" width="100" height="50" rx="5" fill="#f3f4f6" stroke="#94a3b8"/>
                    <text x="380" y="42" text-anchor="middle" font-size="20" fill="#94a3b8">NO</text>
                </g>
                <text x="250" y="165" class="result-text" fill="#6b7280">条件に合わないため、max は 35 を維持する</text>
            </svg>
        </div>

    </div>

    <div class="footer">
        <div class="footer-text">アルゴリズムの核心：1周のループ内で2つの if 文が独立して判定を行う。</div>
    </div>
</div>

</body>
</html>
