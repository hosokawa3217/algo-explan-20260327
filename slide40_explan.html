<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習40：線形探索（順次探索）のアルゴリズム</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "Hiragino Kaku Gothic ProN", "ヒラギノ角ゴ ProN W6", sans-serif;
        }
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; padding: 0 80px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }
        .header-area { height: 100px; display: flex; align-items: center; padding-top: 20px; }
        .theme-bar { width: 15px; height: 50px; background-color: #3b82f6; margin-right: 20px; }
        h1 { font-size: 36px; margin: 0; font-weight: 900; }
        
        .structure-info { 
            background: #eff6ff; border: 2px dashed #3b82f6; border-radius: 8px;
            padding: 10px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
        }
        .info-label { font-size: 18px; font-weight: 900; color: #1e40af; }
        .info-desc { font-weight: 700; color: #374151; }

        .infographic-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 240px 240px; gap: 20px; }
        .grid-item { border: 2px solid #e5e7eb; border-radius: 12px; background-color: #f9fafb; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 10px; }

        svg { width: 100%; height: 200px; }
        svg text { font-weight: 900; }
        .grid-title-text { fill: #1e3a8a; font-size: 17px; text-anchor: middle; }
        .title-underline { stroke: #3b82f6; stroke-width: 2; }
        
        /* 線形探索用スタイル */
        .node-rect { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
        .node-focus { fill: #f0f9ff; stroke: #3b82f6; stroke-width: 3; }
        .node-match { fill: #ecfdf5; stroke: #10b981; stroke-width: 3; }
        .val-text { font-size: 16px; fill: #111827; text-anchor: middle; }
        .index-text { font-size: 12px; fill: #6b7280; text-anchor: middle; }
        .ptr-label { font-size: 13px; font-weight: 900; text-anchor: middle; }
        .formula-text { font-size: 16px; font-weight: 900; fill: #2563eb; text-anchor: middle; }
        .result-text { font-size: 15px; font-weight: 900; fill: #374151; text-anchor: middle; }
        
        .footer { height: 60px; display: flex; align-items: center; justify-content: center; border-top: 2px solid #e5e7eb; margin-top: auto; font-weight: 900; color: #1e3a8a; }
    </style>
</head>
<body>

<div class="slide">
    <div class="header-area">
        <div class="theme-bar"></div>
        <h1>練習40：線形探索（順次探索）の論理構造</h1>
    </div>

    <div class="structure-info">
        <div class="info-label">探索の継続条件：二つの「真」が必要</div>
        <div class="info-desc">① (i ≤ n) : まだ配列内である ➡ AND ➡ ② (tbl[i] ≠ data) : まだ見つかっていない</div>
    </div>
    
    <div class="infographic-grid">
        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">① 初期化：先頭からの開始</text>
                <line x1="120" y1="32" x2="380" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">添字 i を 1 に設定し、data = 40 を探す</text>
                
                <g transform="translate(50, 90)">
                    <rect class="node-focus" x="0" y="20" width="60" height="40" rx="4" /><text x="30" y="46" class="val-text">10</text><text x="30" y="75" class="index-text">i=1</text>
                    <rect class="node-rect" x="70" y="20" width="60" height="40" rx="4" /><text x="100" y="46" class="val-text">25</text><text x="100" y="75" class="index-text">2</text>
                    <rect class="node-rect" x="140" y="20" width="60" height="40" rx="4" /><text x="170" y="46" class="val-text">40</text><text x="170" y="75" class="index-text">3</text>
                    <text x="220" y="46" class="val-text">...</text>
                    
                    <polygon points="30,15 22,0 38,0" fill="#3b82f6" /><text x="30" y="-5" class="ptr-label" fill="#3b82f6">i</text>
                </g>
                <text x="250" y="185" class="formula-text">i ← 1</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">② 反復：不一致の間は次へ</text>
                <line x1="130" y1="32" x2="370" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">tbl[i] ≠ data である限り、i を増やす</text>

                <g transform="translate(50, 90)">
                    <rect class="node-rect" x="0" y="20" width="60" height="40" rx="4" opacity="0.4" /><text x="30" y="46" class="val-text" opacity="0.4">10</text>
                    <rect class="node-focus" x="70" y="20" width="60" height="40" rx="4" /><text x="100" y="46" class="val-text">25</text>
                    <rect class="node-rect" x="140" y="20" width="60" height="40" rx="4" /><text x="170" y="46" class="val-text">40</text>
                    
                    <path d="M 40 40 L 60 40" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
                    <polygon points="100,15 92,0 108,0" fill="#3b82f6" /><text x="100" y="-5" class="ptr-label" fill="#3b82f6">i</text>
                </g>
                <text x="250" y="185" class="formula-text">i ← i + 1</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">③ 停止：一致した瞬間にループを抜ける</text>
                <line x1="100" y1="32" x2="400" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">tbl[i] = data になると継続条件が「偽」になる</text>

                <g transform="translate(50, 90)">
                    <rect class="node-rect" x="70" y="20" width="60" height="40" rx="4" opacity="0.4" /><text x="100" y="46" class="val-text" opacity="0.4">25</text>
                    <rect class="node-match" x="140" y="20" width="60" height="40" rx="4" /><text x="170" y="46" class="val-text">40</text>
                    <text x="240" y="46" class="val-text" fill="#10b981">Found!</text>
                    
                    <polygon points="170,15 162,0 178,0" fill="#10b981" /><text x="170" y="-5" class="ptr-label" fill="#10b981">i</text>
                </g>
                <text x="250" y="185" class="formula-text" fill="#10b981">Condition: (tbl[i] ≠ data) is FALSE</text>
            </svg>
        </div>

        <div class="grid-item">
            <svg viewBox="0 0 500 200">
                <text x="250" y="25" class="grid-title-text">④ 判定：i の値で成否を切り分け</text>
                <line x1="130" y1="32" x2="370" y2="32" class="title-underline" />
                <text x="250" y="55" class="result-text">i が配列サイズ n を超えていなければ発見</text>

                <g transform="translate(100, 80)">
                    <rect x="0" y="0" width="300" height="60" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="1" />
                    <text x="150" y="25" class="result-text" fill="#15803d">i ≤ n : 探索成功（発見）</text>
                    <text x="150" y="45" class="result-text" fill="#6b7280" font-size="12px">i > n の場合は最後まで見つからなかった状態</text>
                </g>
                <text x="250" y="185" class="formula-text" fill="#1e40af">if (i ≤ n) { ... }</text>
            </svg>
        </div>
    </div>

    <div class="footer">
        結論：線形探索は「見つからない間」かつ「配列内」という条件で順次チェックを行う。
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" /></marker>
        </defs>
    </svg>
</div>

</body>
</html>
