<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>練習42：先頭移動法の4分割図解</title>
    <style>
        /* ■ 1. 画面構成と基本レイアウト（1280x720px固定） */
        body { 
            margin: 0; padding: 0; background-color: #f3f4f6; 
            display: flex; flex-direction: column; align-items: center; 
            font-family: "BIZ UDPGothic", "Hiragino Kaku Gothic ProN", sans-serif;
        }
        
        .slide { 
            width: 1280px; height: 720px; background-color: #ffffff; 
            margin: 20px 0; position: relative; box-sizing: border-box; 
            padding: 30px 60px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column;
        }

        /* タイトル領域：青色バー（#3b82f6）15px余白 */
        h1 { 
            font-size: 34px; border-left: 20px solid #3b82f6; padding-left: 20px; 
            margin: 0 0 15px 0; color: #000000; line-height: 1.2; font-weight: 900;
        }

        /* 4分割グリッドレイアウト */
        .infographic-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            flex: 1;
            margin-bottom: 50px;
        }

        .grid-item {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            background-color: #f9fafb;
            justify-content: flex-start; /* 上揃え */
        }

        .grid-title {
            font-size: 20px;
            font-weight: 900;
            color: #1e3a8a;
            margin-bottom: 8px;
            text-align: center;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 5px;
        }

        /* ■ 2. 文字・装飾ルール */
        b { font-weight: 900; }

        /* フッター領域：高さ45px、文字サイズ18px */
        .footer { 
            position: absolute; bottom: 30px; left: 60px; right: 60px; 
            height: 45px; display: flex; align-items: center;
            border-top: 2px solid #e5e7eb;
        }
        .footer-text { 
            font-size: 18px; width: 100%; padding-top: 5px; 
            font-weight: bold; color: #4b5563; 
        }

        /* ■ 3. 図式（SVG）実装ルール：矢印24x18固定 */
        svg { width: 100%; height: 100%; }
        text { font-weight: 900; font-size: 18px; }
        .cell { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
        .target { fill: #fee2e2; stroke: #ef4444; stroke-width: 3; }
        .moved { fill: #d1fae5; stroke: #10b981; stroke-width: 3; }
        .arrow { stroke: #3b82f6; stroke-width: 4; fill: none; }
    </style>
</head>
<body>

<div class="slide">
    <h1>練習42：先頭移動法（Move-to-Front）のプロセス</h1>
    
    <div class="infographic-grid">
        <!-- 1. 実行前 -->
        <div class="grid-item">
            <div class="grid-title">① 実行前：データの探索</div>
            <svg viewBox="0 0 500 180">
                <text x="250" y="25" text-anchor="middle" font-size="16">探索データ(4) を発見</text>
                <rect class="cell" x="20" y="60" width="60" height="50" /> <text x="50" y="95" text-anchor="middle">3</text>
                <rect class="cell" x="85" y="60" width="60" height="50" /> <text x="115" y="95" text-anchor="middle">8</text>
                <rect class="cell" x="150" y="60" width="60" height="50" /> <text x="180" y="95" text-anchor="middle">2</text>
                <rect class="cell" x="215" y="60" width="60" height="50" /> <text x="245" y="95" text-anchor="middle">1</text>
                <rect class="target" x="280" y="60" width="60" height="50" /> <text x="310" y="95" text-anchor="middle" fill="#ef4444">4</text>
                <rect class="cell" x="345" y="60" width="60" height="50" /> <text x="375" y="95" text-anchor="middle">6</text>
                <path d="M 310 160 L 310 120" stroke="#ef4444" stroke-width="3" marker-end="url(#arrRed)" fill="none"/>
                <text x="310" y="175" text-anchor="middle" fill="#ef4444" font-size="14">発見位置 i=5</text>
                <defs><marker id="arrRed" markerUnits="userSpaceOnUse" markerWidth="24" markerHeight="18" refX="24" refY="9" orient="auto"><polygon points="0 0, 24 9, 0 18" fill="#ef4444"/></marker></defs>
            </svg>
        </div>

        <!-- 2. 処理途中1 -->
        <div class="grid-item">
            <div class="grid-title">② 処理途中1：データの退避</div>
            <svg viewBox="0 0 500 180">
                <text x="250" y="25" text-anchor="middle" font-size="16">変数 data に見つけた値を保存</text>
                <rect x="200" y="50" width="100" height="60" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="3" />
                <text x="250" y="85" text-anchor="middle">data: 4</text>
                <text x="250" y="140" text-anchor="middle" fill="#4b5563" font-size="14">1～(i-1)番目がずらす対象</text>
                <path d="M 50 160 L 245 160" stroke="#64748b" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrGray)" fill="none"/>
                <defs><marker id="arrGray" markerUnits="userSpaceOnUse" markerWidth="24" markerHeight="18" refX="24" refY="9" orient="auto"><polygon points="0 0, 24 9, 0 18" fill="#64748b"/></marker></defs>
            </svg>
        </div>

        <!-- 3. 処理途中2 -->
        <div class="grid-item">
            <div class="grid-title">③ 処理途中2：順次後ろへずらす</div>
            <svg viewBox="0 0 500 180">
                <rect class="cell" x="20" y="70" width="60" height="50" />
                <rect class="cell" x="85" y="70" width="60" height="50" />
                <rect class="cell" x="150" y="70" width="60" height="50" />
                <rect class="cell" x="215" y="70" width="60" height="50" />
                <rect class="cell" x="280" y="70" width="60" height="50" />
                <path class="arrow" d="M 50 65 Q 82 35 115 65" marker-end="url(#arrBlue)" />
                <path class="arrow" d="M 115 65 Q 147 35 180 65" marker-end="url(#arrBlue)" />
                <path class="arrow" d="M 180 65 Q 212 35 245 65" marker-end="url(#arrBlue)" />
                <path class="arrow" d="M 245 65 Q 277 35 310 65" marker-end="url(#arrBlue)" />
                <text x="250" y="145" text-anchor="middle" fill="#3b82f6" font-size="18">tbl[j] ← tbl[j-1]</text>
                <text x="250" y="170" text-anchor="middle" font-size="14">※後ろから順にずらす</text>
                <defs><marker id="arrBlue" markerUnits="userSpaceOnUse" markerWidth="24" markerHeight="18" refX="24" refY="9" orient="auto"><polygon points="0 0, 24 9, 0 18" fill="#3b82f6"/></marker></defs>
            </svg>
        </div>

        <!-- 4. 実行後 -->
        <div class="grid-item">
            <div class="grid-title">④ 実行後：先頭へ格納</div>
            <svg viewBox="0 0 500 180">
                <text x="250" y="25" text-anchor="middle" font-size="16">tbl[7] に 4 を入れて完了</text>
                <rect class="moved" x="20" y="60" width="60" height="50" /> <text x="50" y="95" text-anchor="middle">4</text>
                <rect class="cell" x="85" y="60" width="60" height="50" /> <text x="115" y="95" text-anchor="middle">3</text>
                <rect class="cell" x="150" y="60" width="60" height="50" /> <text x="180" y="95" text-anchor="middle">8</text>
                <rect class="cell" x="215" y="60" width="60" height="50" /> <text x="245" y="95" text-anchor="middle">2</text>
                <rect class="cell" x="280" y="60" width="60" height="50" /> <text x="310" y="95" text-anchor="middle">1</text>
                <path d="M 50 160 L 50 120" stroke="#10b981" stroke-width="3" marker-end="url(#arrGreen)" fill="none"/>
                <text x="50" y="175" text-anchor="middle" fill="#10b981" font-size="14">先頭が最新の探索データになる</text>
                <defs><marker id="arrGreen" markerUnits="userSpaceOnUse" markerWidth="24" markerHeight="18" refX="24" refY="9" orient="auto"><polygon points="0 0, 24 9, 0 18" fill="#10b981"/></marker></defs>
            </svg>
        </div>
    </div>

    <div class="footer">
        <div class="footer-text"><b>アルゴリズムの要点：</b>データを上書きしないよう、移動は「後ろ（i番目）から順に」行うのが鉄則である。</div>
    </div>
</div>

</body>
</html>
